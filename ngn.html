<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Aiko NGN Members Widget</title>
  <style>
    :root {
      --text: #ffffff;
      --muted: rgba(255,255,255,0.72);
      --shadow: rgba(0,0,0,0.55);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    .widget {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--text);
      text-shadow: 0 2px 8px var(--shadow);
      letter-spacing: 0.04em;
    }

    .stack {
      display: inline-flex;
      flex-direction: column;
      gap: 2px;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
    }

    .label {
      font-size: clamp(18px, 8vw, 42px);
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
    }

    .numbers {
      font-size: clamp(18px, 7vw, 38px);
      line-height: 1.05;
      font-weight: 800;
      color: var(--muted);
    }

    .complete {
      display: none;
      font-size: clamp(18px, 7vw, 34px);
      font-weight: 900;
      color: var(--text);
      animation: pop 1.8s ease-in-out;
    }

    @keyframes pop {
      0% { transform: scale(0.92); opacity: 0; }
      20% { transform: scale(1.04); opacity: 1; }
      80% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0.96); opacity: 0; }
    }
  </style>
</head>
<body>
  <main class="widget">
    <section class="stack" id="normal">
      <div class="label" id="label">NGN MEMBERS</div>
      <div class="numbers"><span id="current">----</span>/<span id="goal">----</span></div>
    </section>
    <section class="complete" id="complete">GOAL COMPLETE</section>
  </main>

  <script>
    let lastGoal = null;
    let lastCurrent = null;

    const currentEl = document.getElementById('current');
    const goalEl = document.getElementById('goal');
    const normalEl = document.getElementById('normal');
    const completeEl = document.getElementById('complete');

    function formatNumber(n) {
      return Number(n).toLocaleString('en-US');
    }

    function showCompleteBriefly() {
      normalEl.style.display = 'none';
      completeEl.style.display = 'block';
      completeEl.style.animation = 'none';
      void completeEl.offsetWidth;
      completeEl.style.animation = 'pop 1.8s ease-in-out';
      setTimeout(() => {
        completeEl.style.display = 'none';
        normalEl.style.display = 'inline-flex';
      }, 1800);
    }

    async function loadStats() {
      try {
        const response = await fetch('/api/ngn?ts=' + Date.now(), { cache: 'no-store' });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.message || 'Stats failed');

        const current = Number(data.current);
        const goal = Number(data.goal);

        // If the goal jumps upward because the old goal was hit, show the quick celebration.
        if (lastGoal !== null && goal > lastGoal && lastCurrent !== null && current >= lastGoal) {
          showCompleteBriefly();
        }

        currentEl.textContent = formatNumber(current);
        goalEl.textContent = formatNumber(goal);
        lastGoal = goal;
        lastCurrent = current;
      } catch (error) {
        currentEl.textContent = 'SETUP';
        goalEl.textContent = 'ERROR';
        console.error(error);
      }
    }

    loadStats();
    setInterval(loadStats, 15000);
  </script>
</body>
</html>
