<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Aiko Goal Widget</title>
<style>
  html,body{margin:0;background:transparent;overflow:hidden;font-family:Georgia,'Times New Roman',serif;color:#fff}
  .wrap{display:inline-block;padding:4px 8px;text-shadow:2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;font-weight:900;line-height:.95;letter-spacing:.2px}
  .line{font-size:30px;white-space:nowrap}.label{font-size:18px;margin-left:4px}.small{font-size:24px;margin-top:2px}.status{font-family:Arial,sans-serif;font-size:11px;opacity:.75;margin-top:6px;text-shadow:1px 1px 0 #000}
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span id="followers">1100/1200</span><span class="label">NGN members</span></div>
    <div class="line small"><span id="subs">155/200</span><span class="label">sub goal</span></div>
    <div class="status" id="status">loading...</div>
  </div>
<script>
const FOLLOWER_STEP = 100;
const SUB_STEP = 50;
function nextGoal(current, step){ let goal = Math.ceil(current / step) * step; if(current >= goal) goal += step; return goal; }
async function refresh(){
  try{
    const res = await fetch('/api/stats', {cache:'no-store'});
    const data = await res.json();
    const followers = Number(data.followers ?? 1100);
    const subs = Number(data.subs ?? 155);
    document.getElementById('followers').textContent = `${followers}/${nextGoal(followers,FOLLOWER_STEP)}`;
    document.getElementById('subs').textContent = `${subs}/${nextGoal(subs,SUB_STEP)}`;
    document.getElementById('status').textContent = data.ok ? '' : (data.message || 'needs setup');
  } catch(e){ document.getElementById('status').textContent='connection error'; }
}
refresh(); setInterval(refresh, 15000);
</script>
</body>
</html>
